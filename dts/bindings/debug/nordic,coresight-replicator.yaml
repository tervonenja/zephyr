description: Nordic Coresight Replicator Configuration

compatible: "nordic,coresight-replicator"

include: [base.yaml]

properties:
  reg:
    required: true

child-binding:
  description: "ID filters of the replicator"
  properties:
    "#address-cells":
      type: int
      const: 1
    "#size-cells":
      type: int
      const: 0
    reg:
      type: int
      required: true
    filter:
      type: int
      required: true
